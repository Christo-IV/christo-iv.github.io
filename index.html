<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <div class="container">
      <!--Navigation-->
      <nav class="side-navigation" id="sideNavigation">
        <a class="nav-element" href="#introduction" id="navIntroduction">
          <span class="nav-circle"></span>
          <p class="nav-text">INTRODUCTION</p>
        </a>

        <a class="nav-element" href="#projects" id="navProjects">
          <span class="nav-circle"></span>
          <p class="nav-text">PROJECTS</p>
        </a>

        <a class="nav-element" href="#skills" id="navSkills">
          <span class="nav-circle"></span>
          <p class="nav-text">MY SKILLS</p>
        </a>

        <a class="nav-element" href="#contact" id="navContact">
          <span class="nav-circle"></span>
          <p class="nav-text">CONTACT</p>
        </a>

        <div class="nav-line"></div>
      </nav>

      <!--Content-->
      <div class="content center-content" id="introduction">
        <p class="page-number">1</p>
      </div>
      <div class="content center-content" id="projects">
        <p class="page-number">2</p>
      </div>
      <div class="content center-content" id="skills">
        <p class="page-number">3</p>
      </div>
      <div class="content center-content" id="contact">
        <p class="page-number">4</p>
        <div class="contact-form">
          <h1 class="form-head">Contact me</h1>
          <form class="form-content">
            <!-- TODO - Find a way to still show user's emails - without turning the background white -->
            <input
              type="text"
              class="form-input"
              placeholder="E-mail"
              autocomplete="no"
              onblur="reverseAnimation()"
              required
            />
            <div class="focus-indicator"></div>
            <input
              type="text"
              class="form-input"
              placeholder="Subject"
              onblur="reverseAnimation()"
              required
            />
            <div class="focus-indicator"></div>
            <textarea
              placeholder="Message"
              class="form-input"
              onblur="reverseAnimation()"
              required
            ></textarea>
            <div class="focus-indicator"></div>
            <input type="submit" class="form-submit" value="Send" />
          </form>
        </div>
      </div>
    </div>

    <script src="JS/main.js"></script>
  </body>
</html>
